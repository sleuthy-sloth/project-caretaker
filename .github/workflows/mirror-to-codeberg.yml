name: Mirror to Codeberg

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg https://oauth2:${CODEBERG_TOKEN}@codeberg.org/${{ vars.CODEBERG_REPO }}.git
          git push codeberg HEAD:${{ github.ref_name }} --force-with-lease
