name: Mirror to Codeberg

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_REPO: ${{ vars.CODEBERG_REPO }}
        run: |
          if [ -z "$CODEBERG_TOKEN" ]; then
            echo "CODEBERG_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$CODEBERG_REPO" ]; then
            echo "CODEBERG_REPO variable is not set (expected format: owner/repo)"
            exit 1
          fi
          git remote add codeberg "https://oauth2:${CODEBERG_TOKEN}@codeberg.org/${CODEBERG_REPO}.git"
          git push codeberg "HEAD:${GITHUB_REF_NAME}" --force
